<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库数据查询系统</title>
    <!-- 引入Bootstrap样式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入图标 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- 引入Excel处理库 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        .img-thumbnail { max-width: 80px; max-height: 80px; }
        .table-responsive { margin-top: 20px; }
        .search-bar { margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container mt-4 mb-5">
    <h2 class="text-center mb-4 fw-bold">📦 仓库数据查询管理系统</h2>

    <!-- 搜索栏 -->
    <div class="row search-bar">
        <div class="col-md-8">
            <input type="text" id="searchInput" class="form-control" placeholder="搜索 SKC / SKU / 中文名称...">
        </div>
        <div class="col-md-4">
            <button class="btn btn-primary w-100" onclick="searchData()">搜索</button>
        </div>
    </div>

    <!-- 功能按钮区 -->
    <div class="d-flex flex-wrap gap-2 mb-3">
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addModal">➕ 新增数据</button>
        <button class="btn btn-info" onclick="exportExcel()">📊 导出Excel</button>
        <label class="btn btn-warning">
            📥 批量导入Excel <input type="file" id="importFile" accept=".xlsx,.xls" hidden onchange="importExcel(event)">
        </label>
        <button class="btn btn-danger" onclick="batchDelete()">🗑️ 批量删除</button>
        <button class="btn btn-secondary" onclick="loadAllData()">🔄 刷新数据</button>
    </div>

    <!-- 数据表格 -->
    <div class="table-responsive">
        <table class="table table-bordered table-hover text-center align-middle">
            <thead class="table-dark">
                <tr>
                    <th><input type="checkbox" id="checkAll"></th>
                    <th>SKC货号</th>
                    <th>SKU货号</th>
                    <th>中文名称</th>
                    <th>进货链接</th>
                    <th>商品图片</th>
                    <th>备注</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="dataTable"></tbody>
        </table>
    </div>
</div>

<!-- 新增/编辑模态框 -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">新增仓库数据</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="dataForm">
                    <input type="hidden" id="dataId">
                    <div class="mb-3">
                        <label>SKC货号 *</label>
                        <input type="text" class="form-control" id="skc" required>
                    </div>
                    <div class="mb-3">
                        <label>SKU货号 *</label>
                        <input type="text" class="form-control" id="sku" required>
                    </div>
                    <div class="mb-3">
                        <label>中文名称 *</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label>进货链接</label>
                        <input type="url" class="form-control" id="link">
                    </div>
                    <div class="mb-3">
                        <label>商品图片</label>
                        <input type="file" class="form-control" id="image" accept="image/*" onchange="previewImage(event)">
                        <img id="previewImg" class="img-thumbnail mt-2 d-none">
                    </div>
                    <div class="mb-3">
                        <label>备注</label>
                        <textarea class="form-control" id="remark" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveData()">保存数据</button>
            </div>
        </div>
    </div>
</div>

<!-- 引入核心JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
